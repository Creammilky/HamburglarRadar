services:
  # 飞书群聊长连接交互服务（@ 机器人查/总结论文等）
  agent:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # 每日晨报定时作业（新加坡时间 08:30 == 00:30 UTC）。
  # 用 ofelia 作轻量容器内 cron 调度，避免依赖宿主 crontab。
  scheduler:
    image: mcuadros/ofelia:latest
    depends_on:
      - agent
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      ofelia.job-run.digest.schedule: "0 30 0 * * *"
      ofelia.job-run.digest.image: "hamburglarradar-agent"
      ofelia.job-run.digest.command: "python -m src.scheduler.daily_digest_job --send"
    restart: unless-stopped

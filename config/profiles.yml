profiles:
  - id: "llm_security_range"
    name: "LLM 安全靶场 / Agent 评测"
    enabled: true
    arxiv_categories:
      - "cs.AI"
      - "cs.CL"
      - "cs.CR"
      - "cs.SE"
      - "cs.LG"
    semantic_query: >
      LLM agents for cybersecurity, offensive and defensive security automation,
      cyber range generation, penetration testing agents, autonomous red teaming and
      blue teaming, CTF-solving agents, MITRE ATT&CK extraction and attack path planning,
      prompt injection and jailbreak evaluation, LLM and agent security benchmarks,
      AI safety evaluation, vulnerability detection and exploitation with LLMs,
      malware analysis automation, tool-use and web agents, agent evaluation benchmarks.

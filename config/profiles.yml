      - "cyber range"
      - "penetration testing"
      - "pentest"
      - "red teaming"
      - "blue team"
      - "MITRE ATT&CK"
      - "attack graph"
      - "attack path"
      - "CTF"
      - "security benchmark"
      - "security evaluation"
      - "LLM agent"
      - "autonomous agent"
      - "tool-use"
      - "prompt injection"
      - "jailbreak"
      - "adversarial"
      - "vulnerability detection"
      - "exploit"
      - "malware"
      - "threat intelligence"
      - "AI safety"
      - "agent security"
    negative_keywords:
      - "blockchain trading"
      - "cryptocurrency price"
      - "wireless sensor"
      - "vehicle routing"
    min_final_score: 0.55
    top_k: 8
